version: "3.9"

services:
  postgres:
    image: postgres:16

    container_name: ai-mock-postgres

    restart: unless-stopped

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_mock_interview

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: